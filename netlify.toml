# Netlify deployment configuration for the ListLens monorepo.
#
# This is a Turborepo with npm workspaces. Netlify must install from the repo
# root so the local workspace package `@listlens/db` resolves correctly. We
# leave `base` unset (defaults to repo root) and run the build through Turbo
# with `--filter=@listlens/web`, then publish from `apps/web/.next`.
#
# The official `@netlify/plugin-nextjs` plugin handles Next.js 15 App Router,
# Route Handlers, middleware, image optimisation, and ISR.
#
# Notes:
# - `output: "standalone"` in apps/web/next.config.ts is auto-disabled when NETLIFY=true
#   (Netlify's plugin generates its own deployment artefacts).
# - Sentry source-map upload runs at build time when SENTRY_AUTH_TOKEN is set in the
#   Netlify dashboard (Site settings → Environment variables).
# - The `/monitoring` Sentry tunnel route is a normal Next.js rewrite handled by the plugin.

[build]
  command = "npx turbo run build --filter=@listlens/web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Service worker must be served from the root scope with no caching, so updates
# propagate quickly. Manifest can be cached for a day.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control          = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
