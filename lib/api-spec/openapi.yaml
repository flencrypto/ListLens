openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Authenticated — returns the current user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /items:
    post:
      tags: [Studio]
      operationId: createStudioItem
      summary: Create a new Studio listing record
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '200':
          description: Item record created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateItemResponse'
  /items/{id}/analyse:
    post:
      tags: [Studio]
      operationId: analyseStudioItem
      summary: Run AI analysis on a Studio listing
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyseItemRequest'
      responses:
        '200':
          description: Analysis complete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyseItemResponse'
        '404':
          description: Listing not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Analysis failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /items/{id}/reanalyse:
    post:
      tags: [Studio]
      operationId: reanalyseStudioItem
      summary: Re-run analysis with user corrections (RecordLens only)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReanalyseItemRequest'
      responses:
        '200':
          description: Re-analysis complete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyseItemResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /guard/checks:
    post:
      tags: [Guard]
      operationId: createGuardCheck
      summary: Create a new Guard check record
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuardCheckRequest'
      responses:
        '200':
          description: Guard check record created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardCheckCreated'
  /guard/checks/{id}/analyse:
    post:
      tags: [Guard]
      operationId: analyseGuardCheck
      summary: Run AI risk analysis on a Guard check
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Risk report generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardCheckAnalysisResponse'
        '500':
          description: Analysis failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Get a presigned URL for uploading a photo to object storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestUploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResult'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    CreateItemRequest:
      type: object
      required: [lens, marketplace, photoUrls]
      properties:
        lens:
          type: string
        marketplace:
          type: string
        photoUrls:
          type: array
          items:
            type: string
    CreateItemResponse:
      type: object
      required: [id, lens, status]
      properties:
        id:
          type: string
        lens:
          type: string
        marketplace:
          type: [string, 'null']
        status:
          type: string
    AnalyseItemRequest:
      type: object
      required: [photoUrls]
      properties:
        lens:
          type: string
        photoUrls:
          type: array
          items:
            type: string
        hint:
          type: string
    StudioAnalysis:
      type: object
      required: [mode, lens, listing_description, identity, attributes, missing_photos, pricing, marketplace_outputs, warnings]
      properties:
        mode:
          type: string
          enum: [studio]
        lens:
          type: string
        listing_description:
          type: string
        identity:
          type: object
          required: [brand, model, confidence]
          properties:
            brand:
              type: [string, 'null']
            model:
              type: [string, 'null']
            confidence:
              type: number
        attributes:
          type: object
          additionalProperties: true
        missing_photos:
          type: array
          items:
            type: string
        pricing:
          type: object
          required: [quick_sale, recommended, high, currency, confidence]
          properties:
            quick_sale:
              type: number
            recommended:
              type: number
            high:
              type: number
            currency:
              type: string
            confidence:
              type: number
        marketplace_outputs:
          type: object
          properties:
            ebay:
              type: object
              additionalProperties: true
            vinted:
              type: object
              additionalProperties: true
        warnings:
          type: array
          items:
            type: string
    AnalyseItemResponse:
      type: object
      required: [analysis]
      properties:
        analysis:
          $ref: '#/components/schemas/StudioAnalysis'
    ReanalyseItemRequest:
      type: object
      required: [corrections]
      properties:
        corrections:
          type: object
          additionalProperties: true
    CreateGuardCheckRequest:
      type: object
      required: [lens]
      properties:
        url:
          type: string
        screenshotUrls:
          type: array
          items:
            type: string
        lens:
          type: string
    GuardCheckCreated:
      type: object
      required: [id]
      properties:
        id:
          type: string
    GuardRiskDimension:
      type: object
      required: [score, verdict]
      properties:
        score:
          type: number
          minimum: 0
          maximum: 10
        verdict:
          type: string
    GuardReport:
      type: object
      required: [mode, lens, risk, risk_dimensions, red_flags, green_signals, price_analysis, authenticity_signals, missing_photos, seller_questions, buy_recommendation, disclaimer]
      properties:
        mode:
          type: string
        lens:
          type: string
        risk:
          type: object
          required: [level, confidence, summary]
          properties:
            level:
              type: string
              enum: [low, medium, medium_high, high, inconclusive]
            confidence:
              type: number
            summary:
              type: string
        risk_dimensions:
          type: object
          required: [price, photos, listing_quality, item_authenticity, seller_signals]
          properties:
            price:
              $ref: '#/components/schemas/GuardRiskDimension'
            photos:
              $ref: '#/components/schemas/GuardRiskDimension'
            listing_quality:
              $ref: '#/components/schemas/GuardRiskDimension'
            item_authenticity:
              $ref: '#/components/schemas/GuardRiskDimension'
            seller_signals:
              $ref: '#/components/schemas/GuardRiskDimension'
        red_flags:
          type: array
          items:
            type: object
            required: [severity, type, message]
            properties:
              severity:
                type: string
                enum: [low, medium, high]
              type:
                type: string
              message:
                type: string
        green_signals:
          type: array
          items:
            type: object
            required: [type, message]
            properties:
              type:
                type: string
              message:
                type: string
        price_analysis:
          type: object
          required: [price_verdict, price_note]
          properties:
            asking_price:
              type: [string, 'null']
            market_estimate:
              type: [string, 'null']
            price_verdict:
              type: string
              enum: [fair, low_risk_deal, suspiciously_low, overpriced, unknown]
            price_note:
              type: string
        authenticity_signals:
          type: array
          items:
            type: object
            required: [marker, observed, verdict]
            properties:
              marker:
                type: string
              observed:
                type: string
              verdict:
                type: string
                enum: [pass, fail, unclear]
        missing_photos:
          type: array
          items:
            type: string
        seller_questions:
          type: array
          items:
            type: string
        buy_recommendation:
          type: object
          required: [verdict, reasoning]
          properties:
            verdict:
              type: string
              enum: [proceed, proceed_with_caution, ask_questions_first, avoid]
            reasoning:
              type: string
        disclaimer:
          type: string
    GuardCheckAnalysisResponse:
      type: object
      required: [id, report]
      properties:
        id:
          type: string
        report:
          $ref: '#/components/schemas/GuardReport'
    RequestUploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
    UploadUrlResult:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
