name: CI

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Install · Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    env:
      LISTLENS_ALLOW_PLACEHOLDER_CLERK_KEY: "1"
      # Placeholder Clerk key for CI builds (pk_test_{base64("clerk.example.com$")}).
      # Real deploys must override with a genuine publishable key via repository secrets.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
