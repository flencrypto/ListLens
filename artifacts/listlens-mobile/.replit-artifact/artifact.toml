kind = "mobile"
previewPath = "/listlens-mobile/"
title = "Mr.FLENS · List-LENS Mobile"
version = "1.0.0"
id = "artifacts/listlens-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/listlens-mobile/" ]
localPort = 20592

[services.development]
run = "pnpm --filter @workspace/listlens-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/listlens-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/listlens-mobile", "run", "serve" ]

[services.env]
PORT = "20592"
BASE_PATH = "/listlens-mobile/"
