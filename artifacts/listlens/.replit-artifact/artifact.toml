kind = "web"
previewPath = "/"
title = "Mr.FLENS · List-LENS"
version = "1.0.0"
id = "artifacts/listlens"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24406

[services.development]
run = "pnpm --filter @workspace/listlens run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/listlens", "run", "build" ]
publicDir = "artifacts/listlens/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24406"
BASE_PATH = "/"
